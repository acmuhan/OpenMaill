services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: openmail-account-console:latest
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      FLASK_DEBUG: "0"
      OPENMAIL_HTTP_TIMEOUT: "${OPENMAIL_HTTP_TIMEOUT:-30}"
    restart: unless-stopped
